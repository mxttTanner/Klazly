name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel superseded runs on the same ref so a fast follow-up push doesn't
# wait behind a stale build.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        # RLS integration tests self-skip without Supabase secrets, so this
        # runs the pure-logic suite on every PR. To also run the cross-center
        # isolation tests, add NEXT_PUBLIC_SUPABASE_URL,
        # NEXT_PUBLIC_SUPABASE_ANON_KEY and SUPABASE_SERVICE_ROLE_KEY as repo
        # secrets and they'll be picked up here.
        run: npm test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build
        # next build runs the prebuild guard scripts (no-localhost-fallback,
        # no-card-language, no-ai-marketing-words) automatically. The public
        # Supabase vars are build-time inlined; dummy values are fine for a
        # compile-only check since CI doesn't hit the network.
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
